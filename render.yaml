services:
  - type: web
    name: mealwise-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mealwise-db
          property: connectionString
      - key: GOOGLE_API_KEY
        sync: false
      - key: SECRET_key
        sync: false
      - key: USDA_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: mealwise-db
    plan: free
